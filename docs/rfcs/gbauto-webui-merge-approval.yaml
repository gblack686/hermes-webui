merge_strategy:
  rule: "Keep every 8787 native page, then port every 9119 page into the 8787 shell using the GBauto skin/layout."
  no_sidecar: true
  no_iframe_9119: true
  browser_supabase_reads: false
  data_contract:
    preferred: "8787 api routes and/or native Hermes plugins"
    avoid:
      - "127.0.0.1:8791 sidecar"
      - "client-side Supabase queries"
      - "9119 iframe embeds"
  implementation_order:
    - "Freeze GBauto theme tokens as the site baseline."
    - "Add a page registry that drives nav, route ownership, and port status."
    - "Map each 9119 built-in route to a 8787 route target."
    - "Expose 9119 data needs through 8787 API/plugin routes."
    - "Port one page at a time behind the 8787 shell."
    - "Remove external dashboard-link behavior after parity."

