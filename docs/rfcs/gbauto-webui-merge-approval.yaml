version: 1
status: approval_example
updated: 2026-07-01

decision:
  primary_shell:
    app: hermes-webui
    port: 8787
    reason: "Keep the native authenticated WebUI shell as the single operator surface."
  deprecated_surfaces:
    - app: gbauto-dashboard-sidecar
      port: 8791
      action: scrap
      reason: "No sidecar. Add data through native 8787 backend/plugin routes."
    - app: official-hermes-dashboard
      port: 9119
      action: port_pages_into_8787
      reason: "Do not iframe or keep a second operator dashboard."

