design_footprint:
  format: "Aura DESIGN.md visual DNA adapted into YAML"
  status: approval_example
  profile_consulted:
    id: aura-web-designer
    path: "gbautomation/second-brain/systems/hermes-profiles/tac/profiles/aura-web-designer.yaml"
    rules_applied:
      - "Retrieve before advising and cite local source paths."
      - "Specify typography, spacing, layout grammar, surfaces, motion, and responsive states."
      - "For GBauto pages, use cream, terracotta, Newsreader, Inter, muted technical surfaces, and restrained motion."
      - "Treat DESIGN.md as visual DNA rather than production source to copy."
  pattern_reference:
    path: "gbautomation/artifacts/aura-templates/vesper-space/DESIGN.md"
    extracted_shape:
      - "frontmatter-style tokens for colors, typography, spacing, rounded, components, and motion"
      - "short narrative sections for overview, colors, typography, spacing, layout, depth, components, motion, dos/donts, and accessibility"
  home_sources:
    route: /home
    app: "hermes-agent official dashboard"
    page_source: "hermes-agent/web/src/pages/HomePage.tsx"
    css_source: "hermes-agent/web/src/index.css lines 1017-1295"
    token_source: "hermes-agent/web/src/styles/gbauto-theme.css"
    target_port: "hermes-webui 8787 /home"
  footprint:
    version: "1.0.0"
    name: "GBauto Hermes Home"
    description: "A cream report-paper home surface where chat is the primary action, route access sits one click away, and dashboard context is presented as a compact operational gallery."
    colors:
      ink: "#191919"
      cream: "#F3F1E7"
      cream_2: "#E6E4D9"
      stone: "#D6D4C8"
      terracotta: "#D97757"
      terracotta_hover: "#B75F43"
      muted: "#8C8A84"
      shell_dark: "#041C1C"
    typography:
      display:
        family: "Newsreader"
        weights: [400, 500]
        style: "Large editorial serif headings with tight line-height and zero tracking."
      body:
        family: "Inter"
        weights: [300, 400, 500, 600]
        style: "Compact operator UI copy with readable 1.5-1.55 line-height."
      mono:
        family: "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas"
        style: "Small uppercase labels, route tabs, metadata, and command buttons."
    spacing:
      page_gap: "1rem"
      hero_padding: "clamp(2.5rem, 6vw, 5rem) 1rem 1.25rem"
      composer_width: "min(48rem, 100%)"
      gallery_gap: "0.85rem"
      card_padding: "0.68rem"
      mobile_breakpoints:
        tablet: "1024px switches route strip/gallery to two columns"
        phone: "640px switches route strip/gallery to one column"
    rounded:
      home_cards: "0px in source unless inherited; keep crisp report-paper edges for this page"
      gbauto_cards_elsewhere: "8px-14px tokenized radius from gbauto-theme.css"
      pills: "999px only for explicit chip/pill controls"
    layout:
      structure:
        - "hero prompt composer first"
        - "five primary route buttons second"
        - "five-card operational gallery third"
      grid:
        route_strip_desktop: "repeat(5, minmax(0, 1fr))"
        gallery_desktop: "repeat(5, minmax(0, 1fr))"
      hierarchy:
        h1: "max-width 56rem, clamp(2.8rem, 7vw, 6.2rem), line-height 0.92"
        intro: "max-width 42rem, muted ink at 0.98rem"
        cards: "image, mono meta, serif label, clamped description, mono action"
    surfaces:
      hero: "cream paper with subtle 32px grid lines and soft white-to-cream gradient"
      composer: "cream glass panel with light border and long soft shadow"
      route_buttons: "thin ink border, translucent white fill, terracotta hover"
      cards: "stone border, cream_2 translucent fill, image plate, terracotta hover border"
      shell_relationship: "home page is a light GBauto paper island inside the darker Hermes operator shell"
    components:
      prompt_composer:
        behavior: "textarea plus quick prompts plus Send to Hermes button"
        target_8787: "wire to native WebUI chat session creation instead of 9119 navigate('/chat?prompt=...')"
      route_strip:
        items: [Overview, Repos, Skills, Langfuse, Artifacts]
        target_8787: "map to registry-owned 8787 routes; hide unavailable routes until ported"
      gallery_cards:
        items: [Hermes Chat, Observability, Skills, Artifacts, Repos]
        target_8787: "reuse card grammar for migrated dashboard destinations"
    motion:
      hover_duration: "160ms"
      card_hover: "translateY(-2px)"
      allowed: "subtle hover, focus, and loading states only"
      avoid:
        - "purple SaaS gradients"
        - "decorative blobs"
        - "heavy parallax"
        - "nested cards"
    responsive:
      desktop: "5-column strip and gallery"
      tablet: "2-column strip and gallery; composer footer stacks"
      mobile: "single-column strip and gallery; preserve prompt-first flow"
    accessibility:
      - "Keep the hero h1 as the page landmark heading."
      - "Use real links for route strip and gallery destinations."
      - "Keep quick prompt buttons keyboard reachable and text non-overlapping."
      - "Maintain visible focus states using terracotta/ink contrast."
      - "Decorative gallery images should stay empty-alt unless a card needs visual meaning."
    dos:
      - "Keep chat as the first interaction on /home."
      - "Use route cards to expose operational destinations without crowding the shell nav."
      - "Keep typography editorial but compact enough for repeated operator use."
      - "Use actual GBauto variables from static/style.css and gbauto-theme.css when porting."
    donts:
      - "Do not preserve 9119 as an iframe."
      - "Do not add an 8791 sidecar for this page."
      - "Do not query Supabase directly from browser code."
      - "Do not turn /home into a marketing landing page."
      - "Do not replace the WebUI shell with React-only dashboard assumptions."

