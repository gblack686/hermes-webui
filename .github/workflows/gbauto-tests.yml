name: gbauto Tests

# Fast, focused PR signal for the gbauto migration test suite. Runs ONLY the
# gbauto module tests on a single Python version (3.12). These tests are
# hermetic and degrade-safe: no secrets, no network. The full matrix suite in
# tests.yml (ubuntu, py3.11/3.12/3.13, 5 shards) still covers everything —
# this job just gives contributors a quick green/red on the gbauto modules.

on:
  push:
  pull_request:

jobs:
  gbauto-tests:
    name: gbauto-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            **/setup.cfg
            **/requirements*.txt
            **/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run gbauto module tests (hermetic — no secrets, no network)
        run: |
          python -m pytest -q \
            tests/test_snapshot.py \
            tests/test_supabase_health.py \
            tests/test_langfuse_bridge.py \
            tests/test_gcs_documents.py \
            tests/test_agent_config_schema.py \
            tests/test_env_vars.py \
            tests/test_gbauto_agent_profiles.py \
            tests/test_achievements.py \
            tests/test_sankey_explorer.py \
            tests/test_dashboard_probe.py
